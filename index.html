<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest List Manager</title>
  <link rel="stylesheet" href="guest-style.css" />
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Guest List Manager</h1>
    <p>HTML Version of my Java Guest System</p>
  </div>

  <div class="main">
    <div class="panel">
      <h2>Guest List</h2>
      <div id="guestList" class="guest-list"></div>
    </div>

    <div class="panel">
      <h2>Menu</h2>

      <div class="form-group">
        <label for="guestNumber">Guest Number</label>
        <select id="guestNumber"></select>
      </div>

      <div class="form-group">
        <label for="guestName">Guest Name</label>
        <input type="text" id="guestName" placeholder="Enter guest name" />
      </div>

      <div class="button-grid">
        <button onclick="addGuest()">Add Guest</button>
        <button onclick="insertGuest()">Insert Guest</button>
        <button onclick="renameGuest()">Rename Guest</button>
        <button class="danger" onclick="removeGuest()">Remove Guest</button>
      </div>

      <div id="message" class="message"></div>
    </div>
  </div>

  <div class="footer-note">
    Maximum of 10 guests. Preloaded names are included.
  </div>
</div>

<script>
  let guests = [
    'Duendelle','Miming','Balto','Minggay','Oreo','Puti',
    null,null,null,null
  ];

  const guestList = document.getElementById('guestList');
  const guestNumber = document.getElementById('guestNumber');
  const guestName = document.getElementById('guestName');
  const message = document.getElementById('message');

  function loadGuestNumbers() {
    for (let i = 1; i <= 10; i++) {
      let opt = document.createElement('option');
      opt.value = i;
      opt.textContent = i;
      guestNumber.appendChild(opt);
    }
  }

  function displayGuests() {
    guestList.innerHTML = '';

    if (guests.every(g => g === null)) {
      guestList.innerHTML = '<div class="empty">Guest list is empty.</div>';
      return;
    }

    guests.forEach((g, i) => {
      if (g !== null) {
        guestList.innerHTML += `
          <div class="guest-item">
            <span class="guest-number">${i+1}.</span>
            <span class="guest-name">${g}</span>
          </div>`;
      }
    });
  }

  function showMessage(txt, err=false) {
    message.textContent = txt;
    message.style.color = err ? '#ff7b72' : '#8b949e';
  }

  function getName() {
    return guestName.value.trim();
  }

  function addGuest() {
    let name = getName();
    if (!name) return showMessage("Enter name", true);

    for (let i=0;i<guests.length;i++) {
      if (!guests[i]) {
        guests[i]=name;
        guestName.value='';
        displayGuests();
        return showMessage("Added");
      }
    }
    showMessage("List full", true);
  }

  function insertGuest() {
    let n = parseInt(guestNumber.value);
    let name = getName();

    if (!name) return showMessage("Enter name", true);

    if (guests[n-1]) {
      for (let i=guests.length-1;i>n-1;i--) {
        guests[i]=guests[i-1];
      }
      guests[n-1]=name;
      displayGuests();
      guestName.value='';
      showMessage("Inserted");
    } else showMessage("Invalid position", true);
  }

  function renameGuest() {
    let n = parseInt(guestNumber.value);
    let name = getName();

    if (guests[n-1]) {
      guests[n-1]=name;
      displayGuests();
      guestName.value='';
      showMessage("Renamed");
    } else showMessage("Invalid", true);
  }

  function removeGuest() {
    let n = parseInt(guestNumber.value);

    if (guests[n-1]) {
      guests[n-1]=null;
      guests = guests.filter(g=>g!==null).concat(Array(10).fill(null)).slice(0,10);
      displayGuests();
      showMessage("Removed");
    } else showMessage("Invalid", true);
  }

  loadGuestNumbers();
  displayGuests();
</script>

</body>
</html>
